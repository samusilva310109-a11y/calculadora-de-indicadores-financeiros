<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Document</title>
</head>

<body>
    <main id="main">
        <h1>Calculadora de Índices</h1>
        <div class="grid">
            <div class="input-group">
                <label for="ac">Ativo Circulante</label>
                <input type="number" name="" id="ac" placeholder="Ativo Circulante">
            </div>
            <div class="input-group">
                <label for="pc">Passivo Circulante</label>
                <input type="number" name="" id="pc" placeholder="Passivo Circulante">
            </div>
            <div class="input-group">
                <label for="es">Estoque</label>
                <input type="number" name="" id="es" placeholder="Estoque">
            </div>
            <div class="input-group">
                <label for="rlp">Realizável a Longo Prazo</label>
                <input type="number" name="" id="rlp" placeholder="Realizável">
            </div>
            <div class="input-group">
                <label for="pnc">Passível Não Circulante (PNC)</label>
                <input type="number" id="pnc" placeholder="Passível Não Circulante">
            </div>
            <div class="input-group">
                <label for="disp">Disponível (Banco/caixa)</label>
                <input type="number" id="disp" placeholder="Disponível">
            </div>

            <button onclick="calcular()">Calcular</button>
        </div>
        <div id="result">

        </div>
    </main>
</body>

</html>
